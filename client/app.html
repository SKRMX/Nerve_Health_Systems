<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NERVE Health Systems — App</title>
    <link rel="stylesheet" href="assets/css/app.css" />
    <link rel="stylesheet" href="assets/css/register.css" />
    <link rel="icon" href="logos/isotipo_nerve.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #060e14;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #splash-screen img {
            width: 120px;
            margin-bottom: 20px;
            animation: pulse 2s infinite ease-in-out;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(0, 242, 244, 0.1);
            border-top-color: #00F2F4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0.8;
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- SPLASH SCREEN -->
    <div id="splash-screen">
        <img src="logos/logo_nerve.svg" alt="NERVE" />
        <div class="spinner"></div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="login-screen" style="display:none;">
        <div class="login-bg-glow login-bg-1"></div>
        <div class="login-bg-glow login-bg-2"></div>
        <div class="login-card">
            <div class="login-logo">
                <img src="logos/logo_nerve.svg" alt="NERVE Health Systems" />
            </div>
            <h1 class="login-title">Bienvenido de vuelta</h1>
            <p class="login-sub">Ingresa tus credenciales para acceder al sistema</p>
            <div id="roleSelector" style="display:none;"></div>
            <div class="form-group">
                <label class="form-label">Usuario o correo electrónico</label>
                <input type="text" class="form-control" id="loginEmail"
                    placeholder="usuario@hospital.mx o MauricioCV" />
            </div>
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="loginPass" placeholder="••••••••" />
            </div>
            <div
                style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:0.78rem;">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--text-dim);">
                    <input type="checkbox" id="rememberMe" style="accent-color:var(--cyan);" checked /> Recordarme
                </label>
                <a href="#" style="color:var(--cyan);text-decoration:none;">¿Olvidaste tu contraseña?</a>
            </div>
            <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;" onclick="doLogin()">
                Ingresar al sistema →
            </button>
            <p style="text-align:center;margin-top:14px;font-size:0.78rem;color:var(--text-dim);">
                ¿Primera vez? <a href="register.html" style="color:var(--cyan);">Solicitar demo gratuita</a>
            </p>
        </div>
    </div>

    <!-- APP LAYOUT -->
    <div id="app-layout" class="hidden" style="display:none;">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <img src="logos/logo_nerve.svg" alt="NERVE" class="logo-full" />
                <img src="logos/isotipo_nerve.svg" alt="N" class="logo-icon" />
            </div>
            <div class="sidebar-org">
                <div class="sidebar-org-avatar" id="sidebarOrgAvatar">H</div>
                <div class="sidebar-org-info">
                    <div class="sidebar-org-name" id="sidebarOrgName">Hospital General</div>
                    <div class="sidebar-org-role" id="sidebarOrgRole">Doctor</div>
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebarNav"></nav>
            <div class="sidebar-footer">
                <button class="nav-item"
                    style="width:calc(100% - 12px); border:none; background:transparent; margin-bottom:8px;"
                    onclick="doLogout()">
                    <span class="nav-icon">🚪</span>
                    <span class="nav-label">Cerrar sesión</span>
                </button>
                <button class="sidebar-toggle" onclick="toggleSidebar()">
                    <span style="font-size:1rem;">⟨</span>
                    <span class="toggle-label" style="font-size:0.82rem;font-weight:500;">Colapsar</span>
                </button>
            </div>
        </aside>

        <!-- Main -->
        <div class="main">
            <!-- Topbar -->
            <header class="topbar">
                <button onclick="toggleMobileSidebar()"
                    style="display:none;background:none;border:none;cursor:pointer;color:var(--text);font-size:1.2rem;padding:4px;margin-right:8px;"
                    id="mobileMenuBtn">☰</button>
                <div class="topbar-breadcrumb">
                    <span id="breadcrumbSection" style="color:var(--text-dim)">Dashboard</span>
                    <span class="sep">/</span>
                    <span class="current" id="breadcrumbPage">Inicio</span>
                </div>
                <div class="topbar-actions">
                    <div class="topbar-search">
                        <span class="search-icon">🔍</span>
                        <input type="text" placeholder="Buscar pacientes, citas..." id="globalSearch" />
                    </div>
                    <div style="position:relative;">
                        <div class="icon-btn" onclick="toggleNotifications()" title="Notificaciones">
                            🔔
                            <div class="badge"></div>
                        </div>
                        <div class="notif-drop" id="notifDrop">
                            <div class="notif-header">Notificaciones</div>
                            <div style="padding:20px;text-align:center;color:var(--text-dim);font-size:0.85rem;">
                                No tienes notificaciones nuevas
                            </div>
                        </div>
                    </div>
                    <div class="user-avatar" id="userAvatarTopbar" onclick="doLogout()" title="Cerrar sesión">DR</div>
                </div>
            </header>

            <!-- Page Content -->
            <main class="page-content" id="pageContent">
                <!-- Dynamic content rendered here -->
            </main>
        </div>
    </div>

    <!-- MODALS (shared) -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalBox">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">Modal</span>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="assets/js/api.js?v=1.2"></script>
    <script src="assets/js/app.js?v=1.4"></script>
    <script src="assets/js/utils/charts.js?v=1.2"></script>
    <script src="assets/js/modules/specialties.js?v=1.2"></script>
    <script src="assets/js/modules/dashboard.js?v=1.3"></script>
    <script src="assets/js/modules/patients.js?v=1.2"></script>
    <script src="assets/js/modules/appointments.js?v=1.2"></script>
    <script src="assets/js/modules/prescriptions.js?v=1.2"></script>
    <script src="assets/js/modules/admin.js?v=1.2"></script>
    <script src="assets/js/modules/staff.js?v=1.2"></script>
    <script src="assets/js/modules/reports.js?v=1.2"></script>
    <script src="assets/js/modules/importer.js?v=1.2"></script>
    <script src="assets/js/modules/integrations.js?v=1.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
    <script>
        // Failsafe: Si en 5 segundos no se ha quitado el splash (por error de JS), quitarlo a la fuerza
        setTimeout(() => {
            const s = document.getElementById('splash-screen');
            if (s) {
                console.warn('Splash failsafe triggered');
                s.style.opacity = '0';
                s.style.visibility = 'hidden';
                setTimeout(() => s.remove(), 500);
            }
        }, 5000);
    </script>
</body>

</html>
